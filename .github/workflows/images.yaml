name: Container Images

on:
  push:
    branches: [main, feat/central-metadata-server]
    tags: ["v*", "metadata-server-v*", "vllm-plugin-v*"]

permissions:
  contents: read
  packages: write

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/wseaton/layercast

jobs:
  # Detect which components changed so we can skip unnecessary builds.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      metadata-server: ${{ steps.filter.outputs.metadata-server }}
      vllm-plugin: ${{ steps.filter.outputs.vllm-plugin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        # Tags always build everything; branch pushes use path filtering.
        with:
          filters: |
            metadata-server:
              - 'crates/**'
              - 'proto/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Containerfile.metadata-server'
            vllm-plugin:
              - 'vllm-plugin/**'
              - 'Containerfile.vllm-plugin'

  metadata-server:
    name: Build metadata-server
    needs: changes
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      needs.changes.outputs.metadata-server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=metadata-server-
            type=ref,event=branch,prefix=metadata-server-
            type=semver,pattern={{version}},prefix=metadata-server-v
            type=semver,pattern={{major}}.{{minor}},prefix=metadata-server-v
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile.metadata-server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=metadata-server
          cache-to: type=gha,mode=max,scope=metadata-server

  vllm-plugin:
    name: Build vllm-plugin
    needs: changes
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      needs.changes.outputs.vllm-plugin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/share/boost /usr/local/graalvm /usr/local/share/powershell \
            /usr/local/share/chromium /usr/local/lib/node_modules \
            /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/go /opt/hostedtoolcache/PyPy \
            /usr/share/swift /usr/share/miniconda /usr/local/julia*
          sudo docker image prune -af
          df -h /
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=vllm-plugin-
            type=ref,event=branch,prefix=vllm-plugin-
            type=semver,pattern={{version}},prefix=vllm-plugin-v
            type=semver,pattern={{major}}.{{minor}},prefix=vllm-plugin-v
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile.vllm-plugin
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PACKAGE_VERSION=${{ format('0.0.0+git.{0}', github.sha) }}
          cache-from: |
            type=gha,scope=vllm-plugin
            type=registry,ref=${{ env.IMAGE }}:vllm-plugin-main
          cache-to: type=gha,mode=max,scope=vllm-plugin
