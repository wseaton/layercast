name: Container Images

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/wseaton/layercast

jobs:
  model-mesh:
    name: Build model-mesh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=model-mesh-
            type=ref,event=branch,prefix=model-mesh-
            type=semver,pattern=model-mesh-v{{version}}
            type=semver,pattern=model-mesh-v{{major}}.{{minor}}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile.model-mesh
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=model-mesh
          cache-to: type=gha,mode=max,scope=model-mesh

  vllm-plugin:
    name: Build vllm-plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/share/boost /usr/local/graalvm /usr/local/share/powershell \
            /usr/local/share/chromium /usr/local/lib/node_modules \
            /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/go /opt/hostedtoolcache/PyPy \
            /usr/share/swift /usr/share/miniconda /usr/local/julia*
          sudo docker image prune -af
          df -h /
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=vllm-plugin-
            type=ref,event=branch,prefix=vllm-plugin-
            type=semver,pattern=vllm-plugin-v{{version}}
            type=semver,pattern=vllm-plugin-v{{major}}.{{minor}}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile.vllm-plugin
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=vllm-plugin
          cache-to: type=gha,mode=max,scope=vllm-plugin
