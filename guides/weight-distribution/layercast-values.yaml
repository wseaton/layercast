# layercast-values.yaml
# Overlay for llm-d-modelservice chart.
# Points vLLM at the central layercast metadata server (no sidecar needed).

modelArtifacts:
  name: Qwen/Qwen2.5-32B

decode:

  containers:
    # ── vLLM (primary) ─────────────────────────────────────────────
    - name: vllm
      image: "ghcr.io/wseaton/layercast:vllm-plugin-latest"
      modelCommand: vllmServe
      args:
        - "--load-format=layercast"
        - "--max-model-len=2048"
        - "--gpu-memory-utilization=0.85"
      env:
        - name: LAYERCAST_SERVER_ADDR
          value: layercast-metadata-server.layercast.svc.cluster.local:50051
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        # torch.compile remote cache via central metadata server
        - name: TORCHINDUCTOR_FX_GRAPH_REMOTE_CACHE
          value: "1"
        - name: TORCHINDUCTOR_REDIS_HOST
          value: layercast-metadata-server.layercast.svc.cluster.local
        - name: TORCHINDUCTOR_REDIS_PORT
          value: "6379"
        - name: FLASHINFER_WORKSPACE_DIR
          value: /tmp/flashinfer
        - name: HOME
          value: /tmp
        # Seed pods: set to "0" to skip peer discovery wait.
        # Consumer pods: leave unset (server default: 120s).
        # - name: PEER_DISCOVERY_TIMEOUT
        #   value: "0"
      resources:
        requests:
          memory: "16Gi"
          cpu: "4"
          nvidia.com/gpu: 1
          rdma/ib: 1
        limits:
          memory: "32Gi"
          cpu: "8"
          nvidia.com/gpu: 1
          rdma/ib: 1
      mountModelVolume: false
      volumeMounts:
        - name: shm
          mountPath: /dev/shm
      extraConfig:
        securityContext:
          capabilities:
            add: ["IPC_LOCK"]

  # ── Pod labels for metadata server crash detection ───────────────
  podLabels:
    layercast.io/managed: "true"

  # ── Shared volumes ────────────────────────────────────────────────
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 4Gi
