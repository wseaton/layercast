# Benchmark scenario: NIXL GPUDirect P2P weight transfer.
#
# Two pods:
#   - seed: loads model from NFS (fast), publishes NIXL VRAM metadata
#   - consumer: loads weights via NIXL GPUDirect from seed's VRAM
#
# Requires the metadata-server to be deployed first:
#   kubectl apply -k deploy/metadata-server/
#
# The seed uses the shared NFS PVC so it starts quickly (no HF download).
# We only benchmark the consumer's time-to-ready.
#
# Substitution vars (via envsubst in benchmark.sh):
#   ${BENCH_MODEL}      - HF model ID (e.g. "Qwen/Qwen2.5-32B")
#   ${BENCH_MODEL_PATH} - Filesystem path component
#
# Images set via kustomize (see deploy/benchmark/kustomization.yaml).

---
# Seed: loads from NFS, publishes NIXL VRAM metadata for consumers.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bench-nixl-seed
  namespace: layercast
  labels:
    app: bench
    bench/scenario: nixl-seed
spec:
  replicas: 1
  selector:
    matchLabels:
      bench/scenario: nixl-seed
  template:
    metadata:
      labels:
        app: bench
        bench/scenario: nixl-seed
        layercast.io/managed: "true"
    spec:
      containers:
        - name: vllm
          image: vllm-plugin:latest
          imagePullPolicy: Always
          command: ["python", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - --model=${BENCH_MODEL}
            - --load-format=layercast
            - --tensor-parallel-size=1
            - --max-model-len=2048
            - --gpu-memory-utilization=0.85
            - --port=8000
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: LAYERCAST_SERVER_ADDR
              value: layercast-metadata-server.layercast.svc.cluster.local:50051
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: PEER_DISCOVERY_TIMEOUT
              value: "0"
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: FLASHINFER_WORKSPACE_DIR
              value: /tmp/flashinfer
            - name: HOME
              value: /tmp
            # torch.compile remote cache via central metadata server
            - name: TORCHINDUCTOR_FX_GRAPH_REMOTE_CACHE
              value: "1"
            - name: TORCHINDUCTOR_REDIS_HOST
              value: layercast-metadata-server.layercast.svc.cluster.local
            - name: TORCHINDUCTOR_REDIS_PORT
              value: "6379"
            - name: NO_COLOR
              value: "1"
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          resources:
            requests:
              memory: "16Gi"
              cpu: "4"
              nvidia.com/gpu: 1
              rdma/ib: 1
            limits:
              memory: "32Gi"
              cpu: "8"
              nvidia.com/gpu: 1
              rdma/ib: 1
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5

      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi

---
# Consumer: discovers seed via metadata server, loads via NIXL GPUDirect.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bench-nixl-consumer
  namespace: layercast
  labels:
    app: bench
    bench/scenario: nixl-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      bench/scenario: nixl-consumer
  template:
    metadata:
      labels:
        app: bench
        bench/scenario: nixl-consumer
        layercast.io/managed: "true"
    spec:
      initContainers:
        - name: wait-for-seed
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for NIXL seed to be ready..."
              until curl -sf http://bench-nixl-seed.layercast.svc.cluster.local:8000/health; do
                echo "seed not ready, retrying in 5s..."
                sleep 5
              done
              echo "Seed is ready!"
      containers:
        - name: vllm
          image: vllm-plugin:latest
          imagePullPolicy: Always
          command: ["python", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - --model=${BENCH_MODEL}
            - --load-format=layercast
            - --tensor-parallel-size=1
            - --max-model-len=2048
            - --gpu-memory-utilization=0.85
            - --port=8000
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: LAYERCAST_SERVER_ADDR
              value: layercast-metadata-server.layercast.svc.cluster.local:50051
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: FLASHINFER_WORKSPACE_DIR
              value: /tmp/flashinfer
            - name: HOME
              value: /tmp
            # torch.compile remote cache via central metadata server
            - name: TORCHINDUCTOR_FX_GRAPH_REMOTE_CACHE
              value: "1"
            - name: TORCHINDUCTOR_REDIS_HOST
              value: layercast-metadata-server.layercast.svc.cluster.local
            - name: TORCHINDUCTOR_REDIS_PORT
              value: "6379"
            - name: NO_COLOR
              value: "1"
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          resources:
            requests:
              memory: "16Gi"
              cpu: "4"
              nvidia.com/gpu: 1
              rdma/ib: 1
            limits:
              memory: "32Gi"
              cpu: "8"
              nvidia.com/gpu: 1
              rdma/ib: 1
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5

      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi

---
# Services for inter-pod communication.
apiVersion: v1
kind: Service
metadata:
  name: bench-nixl-seed
  namespace: layercast
  labels:
    app: bench
    bench/scenario: nixl-seed
spec:
  selector:
    bench/scenario: nixl-seed
  ports:
    - port: 8000
      targetPort: 8000
      name: http

---
apiVersion: v1
kind: Service
metadata:
  name: bench-nixl-consumer
  namespace: layercast
  labels:
    app: bench
    bench/scenario: nixl-consumer
spec:
  clusterIP: None
  selector:
    bench/scenario: nixl-consumer
  ports:
    - port: 8000
      targetPort: 8000
      name: http
