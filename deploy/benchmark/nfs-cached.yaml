# Benchmark scenario: model load from NFS PVC (VAST storage).
#
# Single vLLM pod with --load-format=auto, model pre-populated on the
# shared-vast PVC by the populate job. Tests pure NFS read throughput.
#
# Requires: pvc.yaml applied first.
#
# Substitution vars (via envsubst in benchmark.sh):
#   ${BENCH_MODEL}      - HF model ID (e.g. "Qwen/Qwen2.5-32B")
#   ${BENCH_MODEL_PATH} - Filesystem path component (e.g. "Qwen/Qwen2.5-32B")
#
# Images set via kustomize (see deploy/benchmark/kustomization.yaml).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: bench-nfs-cached
  namespace: layercast
  labels:
    app: bench
    bench/scenario: nfs-cached
spec:
  replicas: 1
  selector:
    matchLabels:
      bench/scenario: nfs-cached
  template:
    metadata:
      labels:
        app: bench
        bench/scenario: nfs-cached
    spec:
      # IMPORTANT: This nodeSelector is specific to environments where the shared-vast
      # NFS storage class only mounts on certain nodes. Remove or adjust for your cluster.
      nodeSelector:
        kubernetes.io/hostname: gf48e48
      containers:
        - name: vllm
          image: vllm-plugin:latest
          command: ["python", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - --model=/mnt/shared/benchmark/${BENCH_MODEL_PATH}
            - --load-format=auto
            - --tensor-parallel-size=1
            - --max-model-len=2048
            - --gpu-memory-utilization=0.85
            - --port=8000
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: FLASHINFER_WORKSPACE_DIR
              value: /tmp/flashinfer
            - name: HOME
              value: /tmp
            - name: NO_COLOR
              value: "1"
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          resources:
            requests:
              memory: "16Gi"
              cpu: "4"
              nvidia.com/gpu: 1
            limits:
              memory: "32Gi"
              cpu: "8"
              nvidia.com/gpu: 1
          volumeMounts:
            - name: shared-cache
              mountPath: /mnt/shared
              readOnly: true
            - name: shm
              mountPath: /dev/shm
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: shared-cache
          persistentVolumeClaim:
            claimName: bench-shared-cache
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
