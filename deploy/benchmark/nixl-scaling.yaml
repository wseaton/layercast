---
# Services for inter-pod communication and init container health checks.
apiVersion: v1
kind: Service
metadata:
  name: bench-scale-seed
  namespace: layercast
  labels:
    app: bench
    bench/scenario: scale-seed
spec:
  selector:
    bench/scenario: scale-seed
  ports:
    - port: 8000
      targetPort: 8000
      name: http
    - port: 7903
      targetPort: 7903
      name: nixl-control

---
apiVersion: v1
kind: Service
metadata:
