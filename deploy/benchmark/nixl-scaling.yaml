            - name: IPC_SOCKET_PATH
              value: /var/run/layercast/daemon.sock
            - name: NIXL_CONTROL_PORT
              value: "7903"
            - name: COMPILE_CACHE_ENABLED
              value: "true"
            - name: COMPILE_CACHE_ADDR
              value: "127.0.0.1:6379"
            - name: MODEL_NAME
              value: ${BENCH_MODEL}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              memory: "8Gi"
              cpu: "4"
          volumeMounts:
            - name: ipc-socket
              mountPath: /var/run/layercast
            - name: compile-cache
              mountPath: /var/cache/layercast/compile-cache

        - name: vllm
          image: vllm-plugin:latest
          imagePullPolicy: Always
          command: ["python", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - --model=${BENCH_MODEL}
            - --load-format=layercast
            - --tensor-parallel-size=1
            - --max-model-len=2048
            - --gpu-memory-utilization=0.85
            - --port=8000
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: LAYERCAST_SOCKET
              value: /var/run/layercast/daemon.sock
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: FLASHINFER_WORKSPACE_DIR
              value: /tmp/flashinfer
            - name: HOME
              value: /tmp
            - name: TORCHINDUCTOR_FX_GRAPH_REMOTE_CACHE
              value: "1"
            - name: TORCHINDUCTOR_REDIS_HOST
              value: "127.0.0.1"
            - name: TORCHINDUCTOR_REDIS_PORT
              value: "6379"
            - name: NO_COLOR
              value: "1"
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          resources:
            requests:
              memory: "16Gi"
              cpu: "4"
              nvidia.com/gpu: 1
              rdma/ib: 1
            limits:
              memory: "32Gi"
              cpu: "8"
              nvidia.com/gpu: 1
              rdma/ib: 1
          volumeMounts:
            - name: ipc-socket
              mountPath: /var/run/layercast
            - name: shm
              mountPath: /dev/shm
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5

      volumes:
        - name: ipc-socket
          emptyDir: {}
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
        - name: compile-cache
          emptyDir:
            sizeLimit: 10Gi

