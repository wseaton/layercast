    metadata:
      labels:
        app: bench
        bench/scenario: scale-c1
    spec:
      serviceAccountName: model-mesh
      initContainers:
        - name: wait-for-seed
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for seed to be ready..."
              until curl -sf http://bench-scale-seed.layercast.svc.cluster.local:8000/health; do
                echo "seed not ready, retrying in 5s..."
                sleep 5
              done
              echo "Seed is ready!"
      containers:
