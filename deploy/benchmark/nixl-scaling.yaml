# Benchmark scenario: NIXL GPUDirect P2P scaling (seed + 2 consumers).
#
# Three pods deployed sequentially:
#   - seed: loads from HF, publishes NIXL VRAM + compile cache
#   - c1: loads weights via NIXL from seed, populates compile cache (NIXL path)
#   - c2: loads via NIXL, gets full compile cache hits from c1 (same code path)
#
# Shows: NIXL transfer scales, compile cache eliminates ~13s compile time.
#
# Substitution vars (via envsubst in benchmark.sh):
#   ${BENCH_MODEL}      - HF model ID (e.g. "Qwen/Qwen2.5-32B")
#
# Images set via kustomize (see deploy/benchmark/kustomization.yaml).

# ── Shared container templates (YAML anchors) ──────────────────────────
# DRY: the model-mesh and vllm containers are identical across all three
# pods except for PEER_DISCOVERY_TIMEOUT on the seed.

---
# Seed: loads from HF, publishes NIXL VRAM metadata for consumers.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bench-scale-seed
  namespace: layercast
  labels:
    app: bench
    bench/scenario: scale-seed
spec:
  replicas: 1
  selector:
    matchLabels:
      bench/scenario: scale-seed
  template:
    metadata:
      labels:
        app: bench
        bench/scenario: scale-seed
    spec:
      serviceAccountName: model-mesh
      containers:
        - name: model-mesh
          image: model-mesh:latest
          imagePullPolicy: Always
          securityContext:
            runAsUser: 2000
            capabilities:
              add: ["IPC_LOCK"]
          ports:
            - containerPort: 7903
              name: nixl-control
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HF_UPSTREAM
              value: https://huggingface.co
            - name: RUST_LOG
              value: model_mesh=debug,transport=debug,discovery=debug
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: RUST_BACKTRACE
              value: "1"
            - name: IPC_SOCKET_PATH
              value: /var/run/layercast/daemon.sock
            - name: NIXL_CONTROL_PORT
              value: "7903"
            - name: COMPILE_CACHE_ENABLED
              value: "true"
            - name: COMPILE_CACHE_ADDR
              value: "127.0.0.1:6379"
            - name: MODEL_NAME
              value: ${BENCH_MODEL}
            - name: PEER_DISCOVERY_TIMEOUT
              value: "0"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              memory: "8Gi"
              cpu: "4"
          volumeMounts:
            - name: ipc-socket
              mountPath: /var/run/layercast
            - name: compile-cache
              mountPath: /var/cache/layercast/compile-cache

        - name: vllm
          image: vllm-plugin:latest
          imagePullPolicy: Always
          command: ["python", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - --model=${BENCH_MODEL}
            - --load-format=layercast
            - --tensor-parallel-size=1
            - --max-model-len=2048
            - --gpu-memory-utilization=0.85
            - --port=8000
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: LAYERCAST_SOCKET
              value: /var/run/layercast/daemon.sock
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: FLASHINFER_WORKSPACE_DIR
              value: /tmp/flashinfer
            - name: HOME
              value: /tmp
            - name: TORCHINDUCTOR_FX_GRAPH_REMOTE_CACHE
              value: "1"
            - name: TORCHINDUCTOR_REDIS_HOST
              value: "127.0.0.1"
            - name: TORCHINDUCTOR_REDIS_PORT
              value: "6379"
            - name: NO_COLOR
              value: "1"
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          resources:
            requests:
              memory: "16Gi"
              cpu: "4"
              nvidia.com/gpu: 1
              rdma/ib: 1
            limits:
              memory: "32Gi"
              cpu: "8"
              nvidia.com/gpu: 1
              rdma/ib: 1
          volumeMounts:
            - name: ipc-socket
              mountPath: /var/run/layercast
            - name: shm
              mountPath: /dev/shm
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5

      volumes:
        - name: ipc-socket
          emptyDir: {}
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
        - name: compile-cache
          emptyDir:
            sizeLimit: 10Gi

---
# Consumer-1: waits for seed, loads via NIXL, populates compile cache.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bench-scale-c1
  namespace: layercast
  labels:
    app: bench
    bench/scenario: scale-c1
