# Benchmark scenario: NIXL GPUDirect P2P scaling (seed + 2 consumers).
#
# Three pods deployed sequentially:
#   - seed: loads from HF, publishes NIXL VRAM + compile cache
#   - c1: loads weights via NIXL from seed, populates compile cache (NIXL path)
#   - c2: loads via NIXL, gets full compile cache hits from c1 (same code path)
#
# Requires the metadata-server to be deployed first:
#   kubectl apply -k deploy/metadata-server/
#
# Shows: NIXL transfer scales, compile cache eliminates ~13s compile time.
#
# Substitution vars (via envsubst in benchmark.sh):
#   ${BENCH_MODEL}      - HF model ID (e.g. "Qwen/Qwen2.5-32B")
#
# Images set via kustomize (see deploy/benchmark/kustomization.yaml).

---
# Seed: loads from HF, publishes NIXL VRAM metadata for consumers.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bench-scale-seed
  namespace: layercast
  labels:
    app: bench
    bench/scenario: scale-seed
spec:
  replicas: 1
  selector:
    matchLabels:
      bench/scenario: scale-seed
  template:
    metadata:
      labels:
        app: bench
        bench/scenario: scale-seed
        layercast.io/managed: "true"
    spec:
      containers:
        - name: vllm
          image: vllm-plugin:latest
          imagePullPolicy: Always
          command: ["python", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - --model=${BENCH_MODEL}
            - --load-format=layercast
            - --tensor-parallel-size=1
            - --max-model-len=2048
            - --gpu-memory-utilization=0.85
            - --port=8000
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: LAYERCAST_SERVER_ADDR
              value: layercast-metadata-server.layercast.svc.cluster.local:50051
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: PEER_DISCOVERY_TIMEOUT
              value: "0"
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: FLASHINFER_WORKSPACE_DIR
              value: /tmp/flashinfer
            - name: HOME
              value: /tmp
            - name: TORCHINDUCTOR_FX_GRAPH_REMOTE_CACHE
              value: "1"
            - name: TORCHINDUCTOR_REDIS_HOST
              value: layercast-metadata-server.layercast.svc.cluster.local
            - name: TORCHINDUCTOR_REDIS_PORT
              value: "6379"
            - name: NO_COLOR
              value: "1"
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          resources:
            requests:
              memory: "16Gi"
              cpu: "4"
              nvidia.com/gpu: 1
              rdma/ib: 1
            limits:
              memory: "32Gi"
              cpu: "8"
              nvidia.com/gpu: 1
              rdma/ib: 1
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5

      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi

---
# Consumer-1: waits for seed, loads via NIXL, populates compile cache.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bench-scale-c1
  namespace: layercast
  labels:
    app: bench
    bench/scenario: scale-c1
spec:
  replicas: 1
  selector:
    matchLabels:
      bench/scenario: scale-c1
  template:
    metadata:
      labels:
        app: bench
        bench/scenario: scale-c1
        layercast.io/managed: "true"
    spec:
      initContainers:
        - name: wait-for-seed
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for seed to be ready..."
              until curl -sf http://bench-scale-seed.layercast.svc.cluster.local:8000/health; do
                echo "seed not ready, retrying in 5s..."
                sleep 5
              done
              echo "Seed is ready!"
      containers:
        - name: vllm
          image: vllm-plugin:latest
          imagePullPolicy: Always
          command: ["python", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - --model=${BENCH_MODEL}
            - --load-format=layercast
            - --tensor-parallel-size=1
            - --max-model-len=2048
            - --gpu-memory-utilization=0.85
            - --port=8000
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: LAYERCAST_SERVER_ADDR
              value: layercast-metadata-server.layercast.svc.cluster.local:50051
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: FLASHINFER_WORKSPACE_DIR
              value: /tmp/flashinfer
            - name: HOME
              value: /tmp
            - name: TORCHINDUCTOR_FX_GRAPH_REMOTE_CACHE
              value: "1"
            - name: TORCHINDUCTOR_REDIS_HOST
              value: layercast-metadata-server.layercast.svc.cluster.local
            - name: TORCHINDUCTOR_REDIS_PORT
              value: "6379"
            - name: NO_COLOR
              value: "1"
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          resources:
            requests:
              memory: "16Gi"
              cpu: "4"
              nvidia.com/gpu: 1
              rdma/ib: 1
            limits:
              memory: "32Gi"
              cpu: "8"
              nvidia.com/gpu: 1
              rdma/ib: 1
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5

      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi

