apiVersion: v1
kind: Service
metadata:
  name: layercast-metadata-server
  namespace: layercast
  labels:
    app.kubernetes.io/part-of: layercast
    app: metadata-server
spec:
  # Only routes to the ready (leader) pod via readiness gate.
  # Non-leaders fail the readiness probe, so K8s removes them
  # from the endpoints. gRPC and RESP traffic always hits the leader.
  selector:
    app: metadata-server
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
    - name: http
      port: 8081
      targetPort: http
      protocol: TCP
    - name: resp
      port: 6379
      targetPort: resp
      protocol: TCP
