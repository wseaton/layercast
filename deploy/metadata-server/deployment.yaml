apiVersion: apps/v1
kind: Deployment
metadata:
  name: metadata-server
  namespace: layercast
  labels:
    app.kubernetes.io/part-of: layercast
    app: metadata-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: metadata-server
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: layercast
        app: metadata-server
    spec:
      serviceAccountName: metadata-server
      containers:
        - name: metadata-server
          image: metadata-server:latest
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: http
              containerPort: 8081
              protocol: TCP
            - name: resp
              containerPort: 6379
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RUST_LOG
              value: "info,metadata_server=debug"
            - name: COMPILE_CACHE_ENABLED
              value: "true"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: compile-cache
              mountPath: /var/cache/layercast/compile-cache
      volumes:
        - name: compile-cache
          emptyDir:
            sizeLimit: 20Gi
