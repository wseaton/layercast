# ServiceAccount for model-mesh pods to interact with PodCache CRDs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-mesh
  labels:
    app.kubernetes.io/part-of: layercast

---
# Role granting access to PodCache CRDs and pod reads (for ownerRef UID lookup).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: model-mesh
  labels:
    app.kubernetes.io/part-of: layercast
rules:
  - apiGroups: ["layercast.io"]
    resources: ["podcaches", "podcaches/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: model-mesh
  labels:
    app.kubernetes.io/part-of: layercast
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: model-mesh
subjects:
  - kind: ServiceAccount
    name: model-mesh

---
# ClusterRole for reading node labels (GPU product auto-detection).
# Nodes are cluster-scoped so a namespaced Role can't grant access.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: model-mesh-node-reader
  labels:
    app.kubernetes.io/part-of: layercast
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: model-mesh-node-reader
  labels:
    app.kubernetes.io/part-of: layercast
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: model-mesh-node-reader
subjects:
  - kind: ServiceAccount
    name: model-mesh
    namespace: layercast
