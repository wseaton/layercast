# NIXL GPUDirect P2P e2e test.
#
# Deploys central metadata server + vLLM pods with layercast plugin.
# Pod-0 loads from HF (seeds). Pod-1 loads via NIXL GPUDirect from pod-0's GPU.
#
# Usage:
#   kubectl apply -k deploy/nixl-e2e/
#   ./scripts/test-nixl-e2e.sh

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: layercast

resources:
  - namespace.yaml
  - ../metadata-server/
  - services.yaml
  - vllm.yaml

images:
  - name: metadata-server
    newName: ghcr.io/wseaton/layercast
    newTag: metadata-server-main
  - name: vllm-plugin
    newName: ghcr.io/wseaton/layercast
    newTag: vllm-plugin-main
