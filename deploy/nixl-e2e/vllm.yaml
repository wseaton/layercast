# Two-deployment NIXL E2E test.
#
# 1. Deploy vllm-seed first: loads from HF, publishes NIXL VRAM metadata.
# 2. Deploy vllm-consumer second: discovers seed via K8s PodCache, loads via NIXL P2P.
#
# Usage:
#   kubectl apply -f vllm.yaml -l app.kubernetes.io/component=seed
#   # wait for seed to be ready...
#   kubectl apply -f vllm.yaml -l app.kubernetes.io/component=consumer
#
# Or deploy both at once (consumer will fall back to HF if seed isn't ready):
#   kubectl apply -f vllm.yaml

---
# Seed: loads from HF, publishes NIXL VRAM metadata for consumers.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-seed
  labels:
    app: vllm
    app.kubernetes.io/part-of: layercast
    app.kubernetes.io/component: seed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
      app.kubernetes.io/component: seed
  template:
    metadata:
      labels:
        app: vllm
        app.kubernetes.io/component: seed
    spec:
      serviceAccountName: model-mesh
      containers:
        - name: model-mesh
          image: model-mesh:latest
          imagePullPolicy: Always
          securityContext:
            runAsUser: 2000
            capabilities:
              add: ["IPC_LOCK"]
          ports:
            - containerPort: 8081
              name: http
              protocol: TCP
            - containerPort: 7902
              name: rdma-control
              protocol: TCP
            - containerPort: 7903
              name: nixl-control
              protocol: TCP
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HF_UPSTREAM
              value: https://huggingface.co
            - name: RUST_LOG
              value: model_mesh=debug,transport=debug,discovery=debug
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: RUST_BACKTRACE
              value: "1"
            - name: IPC_SOCKET_PATH
              value: /var/run/layercast/daemon.sock
            - name: NIXL_CONTROL_PORT
              value: "7903"
            - name: COMPILE_CACHE_ENABLED
              value: "true"
            - name: COMPILE_CACHE_ADDR
              value: "127.0.0.1:6379"
            - name: MODEL_NAME
              value: Qwen/Qwen2.5-32B
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              memory: "8Gi"
              cpu: "4"
          volumeMounts:
            - name: ipc-socket
              mountPath: /var/run/layercast
            - name: compile-cache
              mountPath: /var/cache/layercast/compile-cache

        - name: vllm
          image: vllm-plugin:latest
          imagePullPolicy: Always
          command:
            - python
            - -m
            - vllm.entrypoints.openai.api_server
          args:
            - --model=Qwen/Qwen2.5-32B
            - --load-format=layercast
            - --tensor-parallel-size=1
            - --max-model-len=2048
            - --gpu-memory-utilization=0.85
            - --port=8000
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: LAYERCAST_SOCKET
              value: /var/run/layercast/daemon.sock
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: FLASHINFER_WORKSPACE_DIR
              value: /tmp/flashinfer
            - name: HOME
              value: /tmp
            # torch.compile remote cache via sidecar RESP shim
            - name: TORCHINDUCTOR_FX_GRAPH_REMOTE_CACHE
              value: "1"
            - name: TORCHINDUCTOR_REDIS_HOST
              value: "127.0.0.1"
            - name: TORCHINDUCTOR_REDIS_PORT
              value: "6379"
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          resources:
            requests:
              memory: "16Gi"
              cpu: "4"
              nvidia.com/gpu: 1
              rdma/ib: 1
            limits:
              memory: "32Gi"
              cpu: "8"
              nvidia.com/gpu: 1
              rdma/ib: 1
          volumeMounts:
            - name: ipc-socket
              mountPath: /var/run/layercast
            - name: shm
              mountPath: /dev/shm
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5

      volumes:
        - name: ipc-socket
          emptyDir: {}
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
        - name: compile-cache
          emptyDir:
            sizeLimit: 10Gi

---
# Consumer: discovers seed via PodCache, loads weights via NIXL P2P.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-consumer
  labels:
    app: vllm
    app.kubernetes.io/part-of: layercast
    app.kubernetes.io/component: consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
      app.kubernetes.io/component: consumer
  template:
    metadata:
      labels:
        app: vllm
        app.kubernetes.io/component: consumer
    spec:
      serviceAccountName: model-mesh
      initContainers:
        # Wait for the seed's vLLM to be healthy before starting.
        # Ensures NIXL VRAM metadata is published and available.
        - name: wait-for-seed
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for vllm-seed to be ready..."
              until curl -sf http://vllm-seed.layercast.svc.cluster.local:8000/health; do
                echo "seed not ready, retrying in 5s..."
                sleep 5
              done
              echo "Seed is ready!"
      containers:
        - name: model-mesh
          image: model-mesh:latest
          imagePullPolicy: Always
          securityContext:
            runAsUser: 2000
            capabilities:
              add: ["IPC_LOCK"]
          ports:
            - containerPort: 8081
              name: http
              protocol: TCP
            - containerPort: 7902
              name: rdma-control
              protocol: TCP
            - containerPort: 7903
              name: nixl-control
              protocol: TCP
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HF_UPSTREAM
              value: https://huggingface.co
            - name: RUST_LOG
              value: model_mesh=debug,transport=debug,discovery=debug
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: RUST_BACKTRACE
              value: "1"
            - name: IPC_SOCKET_PATH
              value: /var/run/layercast/daemon.sock
            - name: NIXL_CONTROL_PORT
              value: "7903"
            - name: COMPILE_CACHE_ENABLED
              value: "true"
            - name: COMPILE_CACHE_ADDR
              value: "127.0.0.1:6379"
            - name: MODEL_NAME
              value: Qwen/Qwen2.5-32B
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              memory: "8Gi"
              cpu: "4"
          volumeMounts:
            - name: ipc-socket
              mountPath: /var/run/layercast
            - name: compile-cache
              mountPath: /var/cache/layercast/compile-cache

        - name: vllm
          image: vllm-plugin:latest
          imagePullPolicy: Always
          command:
            - python
            - -m
            - vllm.entrypoints.openai.api_server
          args:
            - --model=Qwen/Qwen2.5-32B
            - --load-format=layercast
            - --tensor-parallel-size=1
            - --max-model-len=2048
            - --gpu-memory-utilization=0.85
            - --port=8000
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: LAYERCAST_SOCKET
              value: /var/run/layercast/daemon.sock
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: FLASHINFER_WORKSPACE_DIR
              value: /tmp/flashinfer
            - name: HOME
              value: /tmp
            # torch.compile remote cache via sidecar RESP shim
            - name: TORCHINDUCTOR_FX_GRAPH_REMOTE_CACHE
              value: "1"
            - name: TORCHINDUCTOR_REDIS_HOST
              value: "127.0.0.1"
            - name: TORCHINDUCTOR_REDIS_PORT
              value: "6379"
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          resources:
            requests:
              memory: "16Gi"
              cpu: "4"
              nvidia.com/gpu: 1
              rdma/ib: 1
            limits:
              memory: "32Gi"
              cpu: "8"
              nvidia.com/gpu: 1
              rdma/ib: 1
          volumeMounts:
            - name: ipc-socket
              mountPath: /var/run/layercast
            - name: shm
              mountPath: /dev/shm
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5

      volumes:
        - name: ipc-socket
          emptyDir: {}
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
        - name: compile-cache
          emptyDir:
            sizeLimit: 10Gi

---
# Headless service for DNS resolution between pods.
apiVersion: v1
kind: Service
metadata:
  name: vllm
  labels:
    app: vllm
    app.kubernetes.io/part-of: layercast
spec:
  clusterIP: None
  selector:
    app: vllm
  ports:
    - port: 8000
      name: http
      protocol: TCP
    - port: 7903
      name: nixl-control
      protocol: TCP
