# Two-deployment NIXL E2E test.
#
# Requires the metadata-server to be deployed first:
#   kubectl apply -k deploy/metadata-server/
#
# 1. Deploy vllm-seed: loads from HF, publishes NIXL VRAM metadata via gRPC.
# 2. Deploy vllm-consumer: discovers seed via metadata server, loads via NIXL P2P.
#
# Usage:
#   kubectl apply -f vllm.yaml -l app.kubernetes.io/component=seed
#   # wait for seed to be ready...
#   kubectl apply -f vllm.yaml -l app.kubernetes.io/component=consumer
#
# Or deploy both at once (consumer will fall back to HF if seed isn't ready):
#   kubectl apply -f vllm.yaml

---
# Seed: loads from HF, publishes NIXL VRAM metadata for consumers.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-seed
  labels:
    app: vllm
    app.kubernetes.io/part-of: layercast
    app.kubernetes.io/component: seed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
      app.kubernetes.io/component: seed
  template:
    metadata:
      labels:
        app: vllm
        app.kubernetes.io/part-of: layercast
        app.kubernetes.io/component: seed
        layercast.io/managed: "true"
    spec:
      containers:
        - name: vllm
          image: vllm-plugin:latest
          imagePullPolicy: Always
          command:
            - python
            - -m
            - vllm.entrypoints.openai.api_server
          args:
            - --model=Qwen/Qwen2.5-32B
            - --load-format=layercast
            - --tensor-parallel-size=1
            - --max-model-len=2048
            - --gpu-memory-utilization=0.85
            - --port=8000
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: LAYERCAST_SERVER_ADDR
              value: layercast-metadata-server.layercast.svc.cluster.local:50051
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: FLASHINFER_WORKSPACE_DIR
              value: /tmp/flashinfer
            - name: HOME
              value: /tmp
            # torch.compile remote cache via central metadata server
            - name: TORCHINDUCTOR_FX_GRAPH_REMOTE_CACHE
              value: "1"
            - name: TORCHINDUCTOR_REDIS_HOST
              value: layercast-metadata-server.layercast.svc.cluster.local
            - name: TORCHINDUCTOR_REDIS_PORT
              value: "6379"
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          resources:
            requests:
              memory: "16Gi"
              cpu: "4"
              nvidia.com/gpu: 1
              rdma/ib: 1
            limits:
              memory: "32Gi"
              cpu: "8"
              nvidia.com/gpu: 1
              rdma/ib: 1
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5

      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi

---
# Consumer: discovers seed via metadata server, loads weights via NIXL P2P.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-consumer
  labels:
    app: vllm
    app.kubernetes.io/part-of: layercast
    app.kubernetes.io/component: consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
      app.kubernetes.io/component: consumer
  template:
    metadata:
      labels:
        app: vllm
        app.kubernetes.io/part-of: layercast
        app.kubernetes.io/component: consumer
        layercast.io/managed: "true"
    spec:
      initContainers:
        # Wait for the seed's vLLM to be healthy before starting.
        # Ensures NIXL VRAM metadata is published and available.
        - name: wait-for-seed
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for vllm-seed to be ready..."
              until curl -sf http://vllm-seed.layercast.svc.cluster.local:8000/health; do
                echo "seed not ready, retrying in 5s..."
                sleep 5
              done
              echo "Seed is ready!"
      containers:
        - name: vllm
          image: vllm-plugin:latest
          imagePullPolicy: Always
          command:
            - python
            - -m
            - vllm.entrypoints.openai.api_server
          args:
            - --model=Qwen/Qwen2.5-32B
            - --load-format=layercast
            - --tensor-parallel-size=1
            - --max-model-len=2048
            - --gpu-memory-utilization=0.85
            - --port=8000
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: LAYERCAST_SERVER_ADDR
              value: layercast-metadata-server.layercast.svc.cluster.local:50051
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: FLASHINFER_WORKSPACE_DIR
              value: /tmp/flashinfer
            - name: HOME
              value: /tmp
            # torch.compile remote cache via central metadata server
            - name: TORCHINDUCTOR_FX_GRAPH_REMOTE_CACHE
              value: "1"
            - name: TORCHINDUCTOR_REDIS_HOST
              value: layercast-metadata-server.layercast.svc.cluster.local
            - name: TORCHINDUCTOR_REDIS_PORT
              value: "6379"
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          resources:
            requests:
              memory: "16Gi"
              cpu: "4"
              nvidia.com/gpu: 1
              rdma/ib: 1
            limits:
              memory: "32Gi"
              cpu: "8"
              nvidia.com/gpu: 1
              rdma/ib: 1
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5

      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi

---
# Headless service for DNS resolution between pods.
apiVersion: v1
kind: Service
metadata:
  name: vllm
  labels:
    app: vllm
    app.kubernetes.io/part-of: layercast
spec:
  clusterIP: None
  selector:
    app: vllm
  ports:
    - port: 8000
      name: http
      protocol: TCP
