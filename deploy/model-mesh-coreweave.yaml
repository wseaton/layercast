# model-mesh on CoreWeave with RDMA + shared filesystem.
#
# Deploys 2 replicas with rdma/ib devices and a shared VAST PVC.
# NIXL GPUDirect is the primary transfer path, shared FS is the CPU fallback.
#
# Prerequisites:
#   podman build -f Containerfile.model-mesh -t ${REGISTRY}:${TAG} .
#   podman push ${REGISTRY}:${TAG}
#
# Deploy (use kustomize to set the actual image):
#   kubectl apply -f deploy/model-mesh-coreweave.yaml

---
apiVersion: v1
kind: Namespace
metadata:
  name: layercast
  labels:
    app.kubernetes.io/part-of: layercast

---
# Shared RWX PVC for cross-node cache sharing.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-cache
  namespace: layercast
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: shared-vast
  resources:
    requests:
      storage: 100Gi

---
# Headless service for inter-pod communication.
apiVersion: v1
kind: Service
metadata:
  name: model-mesh-headless
  namespace: layercast
  labels:
    app: model-mesh
    app.kubernetes.io/part-of: layercast
spec:
  clusterIP: None
  selector:
    app: model-mesh
  ports:
    - port: 7902
      name: rdma-control
      protocol: TCP
    - port: 7903
      name: nixl-control
      protocol: TCP
    - port: 8081
      name: http
      protocol: TCP

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: model-mesh
  namespace: layercast
  labels:
    app: model-mesh
    app.kubernetes.io/part-of: layercast
spec:
  serviceName: model-mesh-headless
  replicas: 2
  selector:
    matchLabels:
      app: model-mesh
  template:
    metadata:
      labels:
        app: model-mesh
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: model-mesh
          # Use kustomize images transformer to set the actual registry/tag.
          image: model-mesh:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: http
              protocol: TCP
            - containerPort: 7902
              name: rdma-control
              protocol: TCP
            - containerPort: 7903
              name: nixl-control
              protocol: TCP
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HF_UPSTREAM
              value: https://huggingface.co
            - name: RUST_LOG
              value: model_mesh=debug,transport=debug,discovery=info
            - name: RUST_BACKTRACE
              value: "1"
            - name: IPC_SOCKET_PATH
              value: /var/run/layercast/daemon.sock
            - name: NIXL_CONTROL_PORT
              value: "7903"
            - name: LISTEN_ADDR
              value: "0.0.0.0:8081"
            # Compile cache (torch.compile P2P) - sidecar side
            - name: COMPILE_CACHE_ENABLED
              value: "true"
            - name: COMPILE_CACHE_ADDR
              value: "127.0.0.1:6379"
            - name: COMPILE_CACHE_DIR
              value: /var/cache/layercast/compile-cache
            # IMAGE_DIGEST should be set by CI to the container image SHA
            # - name: IMAGE_DIGEST
            #   value: "sha256:..."
            #
            # The vLLM container (same pod, shares localhost) needs these torch env vars:
            #   TORCHINDUCTOR_FX_GRAPH_REMOTE_CACHE: "1"
            #   TORCHINDUCTOR_REDIS_HOST: "127.0.0.1"
            #   TORCHINDUCTOR_REDIS_PORT: "6379"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
              rdma/ib: 1
            limits:
              memory: "16Gi"
              cpu: "4"
              rdma/ib: 1
          volumeMounts:
            - name: ipc-socket
              mountPath: /var/run/layercast
            - name: shared-cache
              mountPath: /mnt/shared
            - name: compile-cache
              mountPath: /var/cache/layercast/compile-cache
      volumes:
        - name: ipc-socket
          hostPath:
            path: /var/run/layercast
            type: DirectoryOrCreate
        - name: shared-cache
          persistentVolumeClaim:
            claimName: shared-cache
        - name: compile-cache
          emptyDir:
            sizeLimit: 10Gi
