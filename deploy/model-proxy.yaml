apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: model-mesh
  namespace: layercast
  labels:
    app: model-mesh
spec:
  selector:
    matchLabels:
      app: model-mesh
  template:
    metadata:
      labels:
        app: model-mesh
    spec:
      hostNetwork: true
      containers:
        - name: model-mesh
          image: model-mesh:dev
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HF_UPSTREAM
              value: https://huggingface.co
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: model-mesh
  namespace: layercast
spec:
  selector:
    app: model-mesh
  ports:
    - port: 80
      targetPort: 8081
      name: http
