apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: model-mesh
  namespace: layercast
  labels:
    app: model-mesh
spec:
  selector:
    matchLabels:
      app: model-mesh
  template:
    metadata:
      labels:
        app: model-mesh
    spec:
      hostNetwork: true
      terminationGracePeriodSeconds: 60
      containers:
        - name: model-mesh
          image: model-mesh:dev
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HF_UPSTREAM
              value: https://huggingface.co
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
---
# Headless service for inter-pod communication.
apiVersion: v1
kind: Service
metadata:
  name: model-mesh-headless
  namespace: layercast
spec:
  clusterIP: None
  selector:
    app: model-mesh
  ports:
    - port: 8081
      name: http
